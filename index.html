<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Avery L6009 Label Editor</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #D4B2D8, #f3e6f7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 360px;
      padding: 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    .screen.active {
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #6a1b9a;
      color: white;
    }

    .google {
      background: #db4437;
      color: white;
    }

    .ghost {
      background: #eee;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="primary" onclick="signIn()">Sign In</button>
  <button class="ghost" onclick="signUp()">Create Account</button>
  <button class="google" onclick="googleLogin()">Sign in with Google</button>

  <div id="msg"></div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <h2>Logged In ✅</h2>
  <p id="userInfo"></p>
  <button class="ghost" onclick="logout()">Sign Out</button>
</div>

<script>
/* =========================
   SUPABASE SETUP
========================= */

const SUPABASE_URL = "https://pbyekmlrwuyyhzuenazs.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieWVrbWxyd3V5eWh6dWVuYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Mzg4NjMsImV4cCI6MjA5MTMxNDg2M30.Vjs2-BVUCNtldnZF4Vyjg6WUeb7drxznYAh32VzBLTI";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   UI HELPERS
========================= */

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function msg(text, error=false) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.style.color = error ? "red" : "green";
}

/* =========================
   AUTH
========================= */

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) msg(error.message, true);
}

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) return msg(error.message, true);

  msg("Check your email to confirm account");
}

async function googleLogin() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin
    }
  });

  if (error) msg(error.message, true);
}

async function logout() {
  await supabaseClient.auth.signOut();
}

/* =========================
   SESSION HANDLING
========================= */

function onLogin(user) {
  document.getElementById("userInfo").textContent = user.email;
  showScreen("appScreen");
}

function onLogout() {
  showScreen("loginScreen");
}

async function initAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session?.user) onLogin(session.user);
  else onLogout();

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session?.user) onLogin(session.user);
    else onLogout();
  });
}

/* =========================
   INIT
========================= */

initAuth();
</script>

</body>
</html>
