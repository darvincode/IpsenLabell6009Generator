<!DOCTYPE html>
<html>
<head>
  <title>Avery L6009 Label Editor</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/umd/supabase.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      /* EXACT Avery L6009 Starting Dimensions */
      --top-margin: 16.8mm;
      --left-margin: 4.8mm;
      --label-width: 47mm;
      --label-height: 22.4mm;
      --col-gap: 4.4mm;
      --row-gap: 0.0mm;
      
      /* Global Font Size */
      --font-size: 12px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: #111827;
      background: radial-gradient(circle at top left, rgba(99,102,241,0.18), transparent 24%), linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
    }
    
    .main-layout {
      display: flex;
      flex-direction: row;
      gap: 30px;
      align-items: flex-start;
    }

    .ui-controls {
      background: white;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.08);
      position: sticky;
      top: 24px;
      min-width: 360px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(15,23,42,0.08);
    }

    .ui-controls button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px 18px;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #4338ca);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: bold;
      transition: background-color 0.2s, color 0.2s;
      box-shadow: 0 10px 30px rgba(79,70,229,0.16);
    }
    
    .ui-controls button:hover { opacity: 0.9; }
    .ui-controls .secondary-btn { background: #f8fafc; color: #111827; border: 1px solid rgba(15,23,42,0.08); box-shadow: none; }
    .ui-controls .danger-btn { background: #ef4444; box-shadow: none; }

    .auth-panel,
    .project-panel {
      background: #f1f3f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #d3d3d3;
    }

    .mode-group {
      display: flex;
      gap: 12px;
      margin-bottom: 15px;
    }
    .mode-btn {
      flex: 1;
      background: #f8fafc !important;
      border: 1px solid rgba(15,23,42,0.08) !important;
      border-radius: 999px !important;
      color: #111827 !important;
      padding: 12px 16px;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: none !important;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, #6366f1, #4338ca) !important;
      color: white !important;
      border-color: transparent !important;
    }

    .input-container {
      margin-bottom: 10px;
      padding-right: 5px;
      min-height: 100px;
    }

    .data-input, .tool-input {
      display: block;
      margin: 5px 0 15px 0;
      padding: 12px;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 14px;
      background: #fbfbff;
    }

    .action-box, .calibration-panel {
      background: #f8fafc;
      padding: 20px;
      border-radius: 24px;
      margin: 15px 0;
      border: 1px solid rgba(15,23,42,0.08);
    }

    .calibration-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .calibration-row input { width: 70px; padding: 4px; text-align: right; border: 1px solid rgba(15,23,42,0.08); border-radius: 14px; }

    /* Sheet simulation */
    .sheet {
      width: 210mm;
      height: 297mm;
      background: white;
      box-shadow: 0 28px 90px rgba(15,23,42,0.08);
      position: relative;
      box-sizing: border-box; 
      flex-shrink: 0;
      user-select: none;
      border-radius: 24px;
      border: 1px solid rgba(15,23,42,0.08);
    }

    .grid {
      position: absolute;
      top: var(--top-margin);     
      left: var(--left-margin);      
      display: grid;
      grid-template-columns: repeat(4, var(--label-width)); 
      grid-auto-rows: var(--label-height);                   
      column-gap: var(--col-gap);                                
      row-gap: var(--row-gap);                                 
    }

    .label {
      display: flex;
      flex-direction: column;
      align-items: center;    
      justify-content: center; 
      text-align: center;
      box-sizing: border-box; 
      border: 1px solid transparent;
      overflow: hidden; 
      padding: 3.5mm; 
      position: relative; 
      cursor: pointer;
      transition: background-color 0.1s;
      font-size: var(--font-size);
    }

    .label:hover { background-color: #f8f9fa; }
    .grid.with-label-lines .label { border: 1px solid #ccc; }
    .grid.align-left .label { align-items: flex-start; text-align: left; }
    .label.selected { background-color: #e3f2fd; border: 2px solid #007bff !important; z-index: 10; }
    .label.overridden::before { content: '✏️'; position: absolute; top: 2px; right: 2px; font-size: 10px; opacity: 0.5; }
    .grid.with-cut-lines .label::after {
      content: '';
      position: absolute;
      top: 1.5mm; left: 1.5mm; right: 1.5mm; bottom: 1.5mm;
      border: 1px dashed #888;
      pointer-events: none; 
    }

    @media print {
      @page { size: A4; margin: 0; }
      body { margin: 0; padding: 0; background-color: white; }
      .ui-controls { display: none !important; }
      .sheet { box-shadow: none; margin: 0; border: none; border-radius: 0; }
      .label.selected { border: 1px solid transparent !important; background-color: transparent !important; }
      .label.overridden::before { display: none; } 
    }

    .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; padding: 30px; box-sizing: border-box;}
    .screen.active { display: flex; }

    #loginScreen { align-items: center; justify-content: center; }
    .login-container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.12);
      border: 1px solid rgba(15,23,42,0.08);
    }
    .login-container h1 { text-align: center; color: #111827; margin: 0 0 30px 0; font-size: 2rem; letter-spacing: -0.03em;}
    .login-container input { width: 100%; padding: 14px 16px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid rgba(15,23,42,0.12); border-radius: 6px; font-size: 0.95rem; background: #fafbff;}
    .login-container button { width: 100%; padding: 14px 16px; margin-bottom: 10px; background-color: #007bff; color: white; border: none; border-radius: 16px; cursor: pointer; font-weight: bold; font-size: 0.95rem; box-shadow: 0 14px 30px rgba(79,70,229,0.12);}

    .project-header { width: min(1200px, 100%); margin: 0 auto 20px; background: rgba(255,255,255,0.95); border: 1px solid rgba(15,23,42,0.08); box-shadow: 0 18px 50px rgba(15,23,42,0.08); padding: 22px 28px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;}
    .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 22px; width: min(1200px, 100%); margin: 0 auto; }
    .project-card, .new-project-card { min-height: 240px; background: white; border-radius: 24px; border: 1px solid rgba(15,23,42,0.08); overflow: hidden; cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .project-card:hover, .new-project-card:hover { transform: translateY(-6px); box-shadow: 0 22px 50px rgba(15,23,42,0.12); }
    .project-card-preview { height: 170px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 38px; }
    .project-card-info { padding: 18px; }
    .new-project-card { border-style: dashed; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #475569; }
    
    #editorScreen { flex-direction: row; align-items: flex-start; justify-content: center; gap: 28px; }
  </style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-container">
    <h1>Avery L6009 Label Editor</h1>
    <input id="authEmail" type="email" placeholder="Email address">
    <input id="authPassword" type="password" placeholder="Password">
    <button onclick="signInWithEmail()">Sign In</button>
    <button onclick="signUpWithEmail()" class="secondary-btn">Create Account</button>
    <div style="text-align: center; margin: 24px 0; color: #6b7280;">or</div>
    <button onclick="signInWithGoogle(event)" class="secondary-btn">Sign In with Google</button>
    <div id="loginMessage" style="text-align: center; margin-top: 15px; font-size: 13px;"></div>
  </div>
</div>

<div id="projectScreen" class="screen">
  <div class="project-header">
    <h1>My Projects</h1>
    <div style="display: flex; gap: 10px;">
      <button onclick="createNewProject()" style="padding: 12px 20px; border-radius: 16px; background: linear-gradient(135deg, #6366f1, #4338ca); color: white; border: none; font-weight: bold; cursor: pointer;">+ New Project</button>
      <button onclick="signOutFromProjects()" class="danger-btn" style="background-color: #ef4444; width: auto; padding: 12px 20px; border-radius: 16px; color: white; border: none; font-weight: bold; cursor: pointer;">Sign Out</button>
    </div>
  </div>
  <div id="projectList" class="project-grid"></div>
  <div id="noProjectsMsg" style="text-align: center; color: #6b7280; padding: 40px; display:none;">No projects yet. Create your first project!</div>
</div>

<div id="editorScreen" class="screen">
  <div class="sheet">
    <div class="grid with-label-lines" id="grid"></div>
  </div>

  <div class="ui-controls">
    <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
      <button onclick="backToProjects()" class="secondary-btn" style="width: auto; margin: 0; padding: 12px 18px;">← Back</button>
      <h2 style="margin: 0; font-size: 18px; color: #333; flex: 1;">Edit Project</h2>
      <button onclick="resetApp()" class="danger-btn" style="width: auto; margin: 0; padding: 6px 12px; font-size: 12px;">Reset</button>
    </div>

    <details style="margin-bottom: 15px; background: #e3f2fd; padding: 10px; border-radius: 6px; border: 1px solid #90caf9;">
      <summary style="cursor: pointer; font-size: 13px; font-weight: bold; color: #0056b3;">📂 Premade Templates</summary>
      <div style="margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button onclick="loadPremade('WFI_LABELS')" style="margin: 0; padding: 6px 10px; font-size: 12px; width: auto;">WFI_LABELS</button>
        <button onclick="loadPremade('MAS_HEAD_LABELS')" style="margin: 0; padding: 6px 10px; font-size: 12px; width: auto;">MAS_HEAD_LABELS</button>
      </div>
    </details>
    
    <label style="font-weight: bold; font-size: 13px; color: #555;">1. Choose Base Layout:</label>
    <div class="mode-group">
      <button id="btn-col" class="mode-btn active" onclick="setBaseMode('column')">Columns</button>
      <button id="btn-row" class="mode-btn" onclick="setBaseMode('row')">Rows</button>
      <button id="btn-all" class="mode-btn" onclick="setBaseMode('all')">All</button>
    </div>

    <label style="font-weight: bold; font-size: 13px; color: #555;">2. Enter Text</label>
    <div style="display: flex; gap: 8px; margin: 10px 0; padding: 10px; background-color: #f8fafc; border-radius: 14px; align-items: center; border: 1px solid rgba(15,23,42,0.08);">
      <label style="font-size: 12px; font-weight: bold;">Size:</label>
      <input type="number" id="fontSizeInput" value="12" style="width: 50px; padding: 4px;" oninput="updateFontSize()">
      <div style="flex-grow: 1;"></div> 
      <button class="secondary-btn" style="width: 32px; margin: 0; padding: 4px;" onclick="insertFormatting('b')">B</button>
      <button class="secondary-btn" style="width: 32px; margin: 0; padding: 4px;" onclick="insertFormatting('i')">I</button>
    </div>

    <div id="dynamic-inputs" class="input-container"></div>

    <button class="secondary-btn" onclick="toggleAlignment()">Toggle Left / Center Alignment</button>
    
    <div style="margin: 15px 0; padding: 10px; background-color: #fff3cd; border: 1px solid #ffeeba; border-radius: 6px;">
      <label style="cursor: pointer; font-size: 13px; font-weight: bold; display: block; margin-bottom: 8px;">
        <input type="checkbox" id="labelLinesToggle" checked onchange="toggleLabelLines()"> Show Label Borders
      </label>
      <label style="cursor: pointer; font-size: 13px; font-weight: bold; display: block;">
        <input type="checkbox" id="cutLinesToggle" onchange="toggleCutLines()"> Show Cut Lines
      </label>
    </div>

    <div class="action-box">
      <h4 style="margin-top: 0; font-size: 14px;">Find & Replace</h4>
      <input type="text" id="findText" class="tool-input" placeholder="Find...">
      <input type="text" id="replaceText" class="tool-input" placeholder="Replace...">
      <button onclick="applyFindReplace()" class="secondary-btn">Apply to All</button>
    </div>

    <details class="calibration-panel">
      <summary style="cursor: pointer; font-weight: bold; font-size: 13px;">⚙️ Grid Calibration</summary>
      <div class="calibration-row"><label>Top Margin:</label><div><input type="number" id="tMargin" value="16.8" step="0.1" oninput="updateGrid()"> mm</div></div>
      <div class="calibration-row"><label>Left Margin:</label><div><input type="number" id="lMargin" value="4.8" step="0.05" oninput="updateGrid()"> mm</div></div>
      <div class="calibration-row"><label>Width:</label><div><input type="number" id="lWidth" value="47" step="0.1" oninput="updateGrid()"> mm</div></div>
      <div class="calibration-row"><label>Height:</label><div><input type="number" id="lHeight" value="22.4" step="0.1" oninput="updateGrid()"> mm</div></div>
    </details>

    <div class="action-box">
      <h4 style="margin-top: 0; font-size: 14px;">Document Name</h4>
      <input type="text" id="docNameInput" class="tool-input" value="Avery_L6009_Labels">
    </div>

    <div class="action-box" style="background-color: #d1ecf1;">
      <button onclick="saveProjectToServer()" style="background-color: #17a2b8;">☁️ Save to Cloud</button>
      <button onclick="saveProject()" class="secondary-btn">💾 Download JSON</button>
      <button onclick="document.getElementById('loadProjectFile').click()" class="secondary-btn">📂 Load JSON</button>
      <input type="file" id="loadProjectFile" style="display:none" accept=".json" onchange="loadProject(event)">
    </div>

    <button id="btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
    <button onclick="window.print()" class="secondary-btn">🖨️ Print (Ctrl+P)</button>
    
    <div style="text-align: center; color: #888; font-style: italic; margin-top: 25px; font-size: 12px;">made by Darvin Magundayao</div>
  </div>
</div>

<script>
// --- GLOBAL CONSTANTS & STATE ---
const ROWS = 12; 
const COLS = 4;
const TOTAL_LABELS = ROWS * COLS;
const SUPABASE_URL = 'https://pbyekmlrwuyyhzuenazs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieWVrbWxyd3V5eWh6dWVuYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Mzg4NjMsImV4cCI6MjA5MTMxNDg2M30.Vjs2-BVUCNtldnZF4Vyjg6WUeb7drxznYAh32VzBLTI';

let baseMode = 'column'; 
let alignment = 'center';
let selectedIndices = new Set();
let lastFocusedInput = null;
let currentUser = null;
let currentProjectId = null;

// Initialize Supabase Client
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Data Storage
let colData = new Array(COLS).fill('');
let rowData = new Array(ROWS).fill('');
let allData = '';
let overrides = new Array(TOTAL_LABELS).fill(null);

const PREMADE_TEMPLATES = {
  'WFI_LABELS': {
    "docName": "Avery_L6009_Labels", "baseMode": "column", "alignment": "left",
    "colData": ["WFI, CYCLE #:, DATE:, EXPIRY:", "WFI, CYCLE #:, DATE:, EXPIRY:", "WFI, CYCLE #:, DATE:, EXPIRY:", "WFI, CYCLE #:, DATE:, EXPIRY:"],
    "rowData": new Array(12).fill("WFI, CYCLE #:, DATE:, EXPIRY:"),
    "allData": "WFI, CYCLE #:, DATE:, EXPIRY:", "overrides": new Array(48).fill(null), "textFormat": { "size": "12" },
    "labelLines": true, "cutLines": false, "calibration": { "tMargin": "16.8", "lMargin": "4.8", "lWidth": "47", "lHeight": "22.4", "cGap": "4.4", "rGap": "0.0" }
  },
  'MAS_HEAD_LABELS': {
    "docName": "MAS_HEAD_LABELS", "baseMode": "all", "alignment": "left",
    "colData": ["MAS HEADS, ITEM:, DATE:, EXPIRY:", "", "", ""],
    "rowData": new Array(12).fill(""), "allData": "MAS HEADS, ITEM:, DATE:, EXPIRY:", "overrides": new Array(48).fill(null),
    "textFormat": { "size": "12" }, "labelLines": true, "cutLines": false, "calibration": { "tMargin": "16.8", "lMargin": "4.8", "lWidth": "47", "lHeight": "22.4", "cGap": "4.4", "rGap": "0.0" }
  }
};

// --- FUNCTIONS ---

async function initApp() {
  renderInputs();
  generate();
  updateGrid();
  await checkSession();
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    if (session && session.user) await onUserLogin(session.user);
    else onUserLogout();
  });
}

async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session && session.user) await onUserLogin(session.user);
  else onUserLogout();
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

function showLoginMessage(message, isError = false) {
  const msg = document.getElementById('loginMessage');
  msg.textContent = message;
  msg.style.color = isError ? '#ef4444' : '#10b981';
}

function onUserLogout() {
  currentUser = null; currentProjectId = null;
  showScreen('loginScreen');
}

async function onUserLogin(user) {
  currentUser = user;
  showScreen('projectScreen');
  await renderProjectList();
}

async function signInWithEmail() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) showLoginMessage(error.message, true);
}

async function signUpWithEmail() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const { error } = await supabaseClient.auth.signUp({ email, password });
  if (error) showLoginMessage(error.message, true);
  else showLoginMessage('Check email to confirm!');
}

async function signInWithGoogle(e) {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) showLoginMessage(error.message, true);
}

async function signOutFromProjects() {
  await supabaseClient.auth.signOut();
}

async function renderProjectList() {
  const container = document.getElementById('projectList');
  const noMsg = document.getElementById('noProjectsMsg');
  container.innerHTML = '';
  const { data } = await supabaseClient.from('projects').select('id,name,updated_at').eq('user_id', currentUser.id).order('updated_at', { ascending: false });

  const newCard = document.createElement('div');
  newCard.className = 'new-project-card';
  newCard.onclick = createNewProject;
  newCard.innerHTML = `<div>+ New Project</div>`;
  container.appendChild(newCard);

  if (data && data.length > 0) {
    data.forEach(p => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.onclick = () => loadProjectById(p.id);
      card.innerHTML = `<div class="project-card-preview">📄</div><div class="project-card-info"><b>${p.name}</b></div>`;
      container.appendChild(card);
    });
    noMsg.style.display = 'none';
  } else { noMsg.style.display = 'block'; }
}

async function loadProjectById(id) {
  const { data } = await supabaseClient.from('projects').select('data').eq('id', id).single();
  if (data) { applyProjectData(data.data); currentProjectId = id; showScreen('editorScreen'); }
}

function createNewProject() { currentProjectId = null; resetApp(); showScreen('editorScreen'); }
function backToProjects() { currentProjectId = null; showScreen('projectScreen'); renderProjectList(); }

async function saveProjectToServer() {
  const name = document.getElementById('docNameInput').value;
  const projectData = { docName: name, baseMode, alignment, colData, rowData, allData, overrides, calibration: { tMargin: document.getElementById('tMargin').value, lMargin: document.getElementById('lMargin').value, lWidth: document.getElementById('lWidth').value, lHeight: document.getElementById('lHeight').value } };
  const payload = { user_id: currentUser.id, name, data: projectData };
  let res = currentProjectId ? await supabaseClient.from('projects').update({ name, data: projectData }).eq('id', currentProjectId) : await supabaseClient.from('projects').insert([payload]);
  if (!res.error) alert('Saved!');
}

function generate() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let index = r * COLS + c;
      const div = document.createElement("div");
      div.className = "label";
      if (selectedIndices.has(index)) div.classList.add('selected');
      if (overrides[index] !== null) div.classList.add('overridden');
      div.onclick = (e) => selectLabel(e, index);
      let baseVal = baseMode === 'column' ? colData[c] : (baseMode === 'row' ? rowData[r] : allData);
      let val = overrides[index] !== null ? overrides[index] : baseVal; 
      div.innerHTML = val ? val.split(',').map(l => l.trim()).join('<br>') : "";
      grid.appendChild(div);
    }
  }
}

function selectLabel(e, idx) {
  if (e.shiftKey || e.ctrlKey) { selectedIndices.has(idx) ? selectedIndices.delete(idx) : selectedIndices.add(idx); }
  else { selectedIndices.clear(); selectedIndices.add(idx); }
  renderInputs(); generate();
}

function renderInputs() {
  const container = document.getElementById('dynamic-inputs');
  container.innerHTML = '';
  if (selectedIndices.size > 0) {
    const area = document.createElement('textarea'); area.className = "data-input"; area.placeholder = "Edit selected...";
    area.oninput = (e) => { selectedIndices.forEach(idx => overrides[idx] = e.target.value); generate(); };
    container.appendChild(area);
  } else {
    let count = baseMode === 'column' ? COLS : (baseMode === 'row' ? ROWS : 1);
    for (let i = 0; i < count; i++) {
      const input = document.createElement('input'); input.className = "data-input";
      input.value = baseMode === 'column' ? colData[i] : (baseMode === 'row' ? rowData[i] : allData);
      input.oninput = (e) => { 
        if(baseMode === 'column') colData[i] = e.target.value; 
        else if(baseMode === 'row') rowData[i] = e.target.value; 
        else allData = e.target.value; 
        generate(); 
      };
      container.appendChild(input);
    }
  }
}

function updateFontSize() { document.documentElement.style.setProperty('--font-size', document.getElementById('fontSizeInput').value + 'px'); }
function updateGrid() {
  const root = document.documentElement;
  root.style.setProperty('--top-margin', document.getElementById('tMargin').value + 'mm');
  root.style.setProperty('--left-margin', document.getElementById('lMargin').value + 'mm');

  root.style.setProperty('--label-height', document.getElementById('lHeight').value + 'mm');
}
function setBaseMode(m) { baseMode = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+m).classList.add('active'); renderInputs(); generate(); }
function toggleLabelLines() { document.getElementById("grid").classList.toggle('with-label-lines'); }
function toggleCutLines() { document.getElementById("grid").classList.toggle('with-cut-lines'); }
function toggleAlignment() { alignment = alignment === 'center' ? 'left' : 'center'; document.getElementById("grid").classList.toggle('align-left', alignment === 'left'); }

function applyProjectData(data) {
  colData = data.colData; rowData = data.rowData; allData = data.allData; overrides = data.overrides;
  if(data.calibration) { document.getElementById('tMargin').value = data.calibration.tMargin; document.getElementById('lMargin').value = data.calibration.lMargin; }
  updateGrid(); generate(); renderInputs();
}

function resetApp() { colData.fill(''); rowData.fill(''); allData = ''; overrides.fill(null); generate(); renderInputs(); }
