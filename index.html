<!DOCTYPE html>
<html>
<head>
  <title>Avery L6009 Label Editor</title>

  <!-- ✅ Load Supabase FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Other libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: Arial; background:#D4B2D8; }
    .screen { display:none; }
    .screen.active { display:block; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h2>Login</h2>
  <input id="authEmail" placeholder="Email"><br><br>
  <input id="authPassword" type="password" placeholder="Password"><br><br>

  <button onclick="signInWithEmail()">Sign In</button>
  <button onclick="signUpWithEmail()">Create Account</button>
  <br><br>
  <button onclick="signInWithGoogle()">Sign In with Google</button>

  <div id="loginMessage"></div>
</div>

<!-- PROJECT SCREEN -->
<div id="projectScreen" class="screen">
  <h2>Logged In ✅</h2>
  <button onclick="signOut()">Sign Out</button>
</div>

<script>
/* =========================
   ✅ SUPABASE INIT FIRST
========================= */

const SUPABASE_URL = "https://pbyekmlrwuyyhzuenazs.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_KEY_HERE"; // keep your key

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   UI HELPERS
========================= */

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showMessage(msg, isError=false) {
  const el = document.getElementById("loginMessage");
  el.textContent = msg;
  el.style.color = isError ? "red" : "green";
}

/* =========================
   AUTH FUNCTIONS
========================= */

async function signInWithEmail() {
  const email = authEmail.value;
  const password = authPassword.value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) return showMessage(error.message, true);
}

async function signUpWithEmail() {
  const email = authEmail.value;
  const password = authPassword.value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  if (error) return showMessage(error.message, true);

  showMessage("Check your email to confirm!");
}

async function signInWithGoogle() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.href
    }
  });

  if (error) showMessage(error.message, true);
}

async function signOut() {
  await supabaseClient.auth.signOut();
  showScreen("loginScreen");
}

/* =========================
   SESSION HANDLING
========================= */

async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session) {
    showScreen("projectScreen");
  } else {
    showScreen("loginScreen");
  }
}

/* =========================
   INIT (FIXED)
========================= */

window.addEventListener("load", async () => {

  // Listen for Google redirect login
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session) {
      showScreen("projectScreen");
    }
  });

  await checkSession();
});
</script>

</body>
</html>
