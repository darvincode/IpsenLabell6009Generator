<!DOCTYPE html>
<html>
<head>
  <title>Avery L6009 | Pro Label Editor</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      /* Avery L6009 Dimensions */
      --top-margin: 16.8mm;
      --left-margin: 4.8mm;
      --label-width: 47mm;
      --label-height: 22.4mm;
      --col-gap: 4.4mm;
      --row-gap: 0.0mm;
      --cols: 4;
      --font-size: 12px;
      
      /* Tech Theme Colors */
      --accent-orange: #f97316;
      --accent-hover: #ea580c;
      --dark-bg: #111827;
      --panel-bg: #1f2937;
      --text-main: #f3f4f6;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 40%, #431407 100%);
      color: var(--text-main);
    }
    
    .main-layout {
      display: flex;
      flex-direction: row;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
    }

    /* UI Sidebar */
    .ui-controls {
      background: var(--panel-bg);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: sticky;
      top: 20px;
      width: 350px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid #374151;
    }

    h2 {
      color: var(--accent-orange);
      font-size: 22px;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .ui-controls button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      cursor: pointer;
      background-color: var(--accent-orange);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .ui-controls button:hover { 
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .ui-controls .secondary-btn { 
      background-color: #374151; 
      color: #d1d5db;
    }
    .ui-controls .secondary-btn:hover { background-color: #4b5563; }

    .ui-controls .danger-btn { 
      background-color: #7f1d1d; 
    }
    .ui-controls .danger-btn:hover { background-color: #991b1b; }

    /* Inputs */
    .data-input, .tool-input {
      background: #111827;
      border: 1px solid #374151;
      color: white;
      padding: 10px;
      border-radius: 6px;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    .data-input:focus {
      outline: 2px solid var(--accent-orange);
      border-color: transparent;
    }

    /* Label Page Container */
    .sheet {
      width: 210mm;
      height: 297mm;
      background: linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(248,250,252,0.92) 100%);
      box-shadow: 0 28px 70px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.25);
      position: relative;
      box-sizing: border-box; 
      flex-shrink: 0;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 10px;
      background: linear-gradient(135deg, rgba(31,41,55,0.96), rgba(15,23,42,0.96));
      color: var(--accent-orange);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .preview-header span {
      opacity: 0.85;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: #e5e7eb;
    }

    /* Grid Setup */
    .grid {
      position: absolute;
      top: calc(var(--top-margin) + 36px);
      left: var(--left-margin);
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--label-width));
      grid-auto-rows: var(--label-height);
      column-gap: var(--col-gap);
      row-gap: var(--row-gap);
      padding: 10px;
      width: calc(100% - 2 * var(--left-margin));
      height: calc(100% - 36px - var(--top-margin));
    }

    .label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #111827;
      box-sizing: border-box;
      border: 1px solid rgba(31, 41, 55, 0.12);
      overflow: hidden;
      padding: 3mm;
      position: relative;
      cursor: crosshair;
      font-size: var(--font-size);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      border-radius: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .label:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      background: rgba(255,255,255,0.98);
    }
    .grid.with-label-lines .label { border: 1px solid #e5e7eb; }
    .grid.align-left .label { align-items: flex-start; text-align: left; }

    .label.selected {
      background-color: #fff7ed;
      border: 2px solid var(--accent-orange) !important;
      z-index: 10;
    }

    .grid.with-cut-lines .label::after {
      content: '';
      position: absolute;
      top: 1mm; left: 1mm; right: 1mm; bottom: 1mm;
      border: 0.5px dashed #fb923c;
      pointer-events: none; 
    }

    /* Custom Scrollbar */
    .ui-controls::-webkit-scrollbar { width: 8px; }
    .ui-controls::-webkit-scrollbar-track { background: var(--panel-bg); }
    .ui-controls::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }

    @media print {
      @page { size: A4; margin: 0; }
      body { background: white; padding: 0; }
      .ui-controls { display: none !important; }
      .sheet { box-shadow: none; margin: 0; }
    }
  </style>
</head>
<body>

<div class="main-layout">
  
  <div class="sheet">
    <div class="preview-header">
      Preview
      <span id="zoomLabel">100%</span>
    </div>
    <div class="grid with-label-lines" id="grid"></div>
  </div>

  <div class="ui-controls">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <h2>AVERY L6009 EDITOR</h2>
      <button onclick="resetApp()" class="danger-btn" style="width: auto; margin: 0; padding: 6px 12px; font-size: 11px;">RESET</button>
    </div>

    <details style="margin-bottom: 20px; background: #2d3748; padding: 12px; border-radius: 8px;">
      <summary style="cursor: pointer; font-size: 13px; font-weight: bold; color: var(--accent-orange);">PRESET TEMPLATES</summary>
      <div style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
        <button onclick="loadPremade('WFI_TUBING_LABELS')" class="secondary-btn" style="padding: 6px; font-size: 11px;">WFI</button>
        <button onclick="loadPremade('MAS_HEAD_LABELS')" class="secondary-btn" style="padding: 6px; font-size: 11px;">MAS HEADS</button>
      </div>
    </details>

    <label style="font-weight: bold; font-size: 12px; color: #9ca3af; text-transform: uppercase;">GRID LOCK</label>
    <div style="display: flex; gap: 8px; margin: 10px 0 20px 0; flex-wrap: wrap;">
      <input type="password" id="gridPinInput" class="tool-input" placeholder="Enter PIN to unlock grid" style="flex:1 1 180px;" oninput="validatePin()">
      <div id="gridLockStatus" style="align-self:center; font-size:12px; color:#9ca3af;">Locked</div>
    </div>

    <details style="margin-bottom: 20px; background: #111827; padding: 12px; border-radius: 8px;">
      <summary style="cursor: pointer; font-size: 13px; font-weight: bold; color: var(--accent-orange);">GRID CONTROL</summary>
      <div style="padding-top: 10px; font-size: 12px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <label>Columns<input id="colsInput" type="number" min="1" max="8" value="4" class="tool-input grid-control" disabled onchange="updateGrid()"></label>
        <label>Rows<input id="rowsInput" type="number" min="1" max="20" value="12" class="tool-input grid-control" disabled onchange="updateGrid()"></label>
        <label>Width (mm)<input id="labelWidthInput" type="number" min="10" step="0.1" value="47" class="tool-input grid-control" disabled onchange="updateGrid()"></label>
        <label>Height (mm)<input id="labelHeightInput" type="number" min="5" step="0.1" value="22.4" class="tool-input grid-control" disabled onchange="updateGrid()"></label>
        <label>Horizontal Gap<input id="colGapInput" type="number" min="0" step="0.1" value="4.4" class="tool-input grid-control" disabled onchange="updateGrid()"></label>
        <label>Vertical Gap<input id="rowGapInput" type="number" min="0" step="0.1" value="0" class="tool-input grid-control" disabled onchange="updateGrid()"></label>
      </div>
    </details>

    <label style="font-weight: bold; font-size: 12px; color: #9ca3af; text-transform: uppercase;">1. Layout Mode</label>
    <div style="display: flex; gap: 8px; margin: 10px 0 10px 0; flex-wrap: wrap;">
      <button id="btn-col" class="secondary-btn" onclick="setBaseMode('column')">Cols</button>
      <button id="btn-row" class="secondary-btn" onclick="setBaseMode('row')">Rows</button>
      <button id="btn-all" class="secondary-btn" onclick="setBaseMode('all')">All</button>
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap;">
      <button class="secondary-btn" style="flex: 1 1 110px;" onclick="updateZoom(-0.1)">Zoom -</button>
      <button class="secondary-btn" style="flex: 1 1 110px;" onclick="updateZoom(0.1)">Zoom +</button>
      <button class="secondary-btn" style="flex: 2 1 160px;" onclick="resetZoom()">Reset Zoom</button>
    </div>

    <label style="font-weight: bold; font-size: 12px; color: #9ca3af; text-transform: uppercase;">2. Content</label>
    <div style="display: flex; gap: 8px; margin: 10px 0; align-items: center;">
      <span style="font-size: 14px;">Size:</span>
      <input type="number" id="fontSizeInput" value="12" style="width: 60px;" class="tool-input" oninput="updateFontSize()">
      <button class="secondary-btn" style="width: 40px;" onclick="insertFormatting('b')">B</button>
      <button class="secondary-btn" style="width: 40px;" onclick="insertFormatting('i')">I</button>
    </div>

    <div id="dynamic-inputs"></div>

    <hr style="border: 0; border-top: 1px solid #374151; margin: 20px 0;">

    <button class="secondary-btn" onclick="toggleAlignment()">Toggle Center / Left</button>
    
    <div style="margin: 15px 0; padding: 12px; background: #111827; border-radius: 8px;">
      <label style="cursor: pointer; font-size: 13px; display: block; margin-bottom: 8px;">
        <input type="checkbox" id="labelLinesToggle" checked onchange="toggleLabelLines()"> Show Grid Guides
      </label>
      <label style="cursor: pointer; font-size: 13px; display: block;">
        <input type="checkbox" id="cutLinesToggle" onchange="toggleCutLines()"> Show Cut Lines
      </label>
    </div>

    <details style="margin-bottom: 20px;">
      <summary style="cursor: pointer; font-size: 13px; color: #9ca3af;">Grid Calibration</summary>
      <div style="padding-top: 10px; font-size: 12px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <label>Top Margin (mm)<input type="number" id="tMargin" value="16.8" step="0.1" class="tool-input" oninput="updateGrid()"></label>
        <label>Left Margin (mm)<input type="number" id="lMargin" value="4.8" step="0.1" class="tool-input" oninput="updateGrid()"></label>
      </div>
    </details>

    <input type="text" id="docNameInput" class="tool-input" value="Avery_L6009_Labels" placeholder="Filename...">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button onclick="saveProject()" class="secondary-btn">SAVE JSON</button>
      <button onclick="document.getElementById('loadProjectFile').click()" class="secondary-btn">LOAD JSON</button>
    </div>
    <input type="file" id="loadProjectFile" style="display:none" accept=".json" onchange="loadProject(event)">

    <button id="btn-pdf" onclick="downloadPDF()" style="margin-top: 15px; background: linear-gradient(to right, #f97316, #ea580c); font-size: 16px;">EXPORT PDF</button>

    <div style="text-align: center; color: #FFFFFF; margin-top: 20px; font-size: 10px; letter-spacing: 1px;">
      TECH-SPEC v2.0 | DARVIN MAGUNDAYAO
    </div>
  </div>
</div>

<script>
let rows = 12;
let cols = 4;
let baseMode = 'column';
let alignment = 'center';
let selectedIndices = new Set();
let lastFocusedInput = null;
let zoomLevel = 1;
let gridUnlocked = false;

let colData = new Array(cols).fill('');
let rowData = new Array(rows).fill('');
let allData = '';
let overrides = new Array(rows * cols).fill(null);

const PREMADE_TEMPLATES = {
  'WFI_TUBING_LABELS': {
    "baseMode": "column",
    "colData": ["WFI, CYCLE #:, DATE:, EXPIRY:", "WFI, CYCLE #:, DATE:, EXPIRY:", "WFI, CYCLE #:, DATE:, EXPIRY:", "WFI, CYCLE #:, DATE:, EXPIRY:"],
    "textFormat": { "size": "11" }
  },
  'MAS_HEAD_LABELS': {
    "baseMode": "all",
    "allData": "MAS HEADS, ITEM:, DATE:, EXPIRY:",
    "textFormat": { "size": "11" }
  }
};

initApp();

function initApp() {
  applyAlignment();
  renderInputs();
  generate();
  updateGrid();
  updateZoom(0);
  document.addEventListener('focusin', e => {
    if(e.target.classList.contains('data-input')) lastFocusedInput = e.target;
  });
}

function getTotalLabels() {
  return rows * cols;
}

function ensureGridArrays() {
  if (colData.length < cols) colData = colData.concat(Array(cols - colData.length).fill(''));
  else if (colData.length > cols) colData.length = cols;

  if (rowData.length < rows) rowData = rowData.concat(Array(rows - rowData.length).fill(''));
  else if (rowData.length > rows) rowData.length = rows;

  const total = getTotalLabels();
  if (overrides.length < total) overrides = overrides.concat(Array(total - overrides.length).fill(null));
  else if (overrides.length > total) overrides.length = total;

  selectedIndices = new Set(Array.from(selectedIndices).filter(idx => idx < total));
}

function renderInputs() {
  const container = document.getElementById('dynamic-inputs');
  container.innerHTML = '';
  
  if (selectedIndices.size > 0) {
    container.innerHTML = `<h4 style="color:var(--accent-orange); font-size:12px;">EDITING SELECTION (${selectedIndices.size})</h4>
      <textarea id="ind_input" class="data-input" rows="3"></textarea>
      <button class="secondary-btn" style="font-size:10px; padding:4px;" onclick="clearSelectedOverrides()">Reset to Base</button>`;
    
    const indInput = document.getElementById('ind_input');
    let arr = Array.from(selectedIndices);
    indInput.value = overrides[arr[0]] || '';
    indInput.oninput = (e) => {
      selectedIndices.forEach(idx => overrides[idx] = e.target.value);
      generate();
    };
  } else {
    let inputs = baseMode === 'column' ? cols : (baseMode === 'row' ? rows : 1);
    for (let i = 0; i < inputs; i++) {
      const input = document.createElement('input');
      input.className = "data-input";
      input.value = baseMode === 'all' ? allData : (baseMode === 'column' ? colData[i] : rowData[i]);
      input.placeholder = `${baseMode.toUpperCase()} ${i+1} Text...`;
      input.oninput = (e) => {
        if (baseMode === 'all') allData = e.target.value;
        else if (baseMode === 'column') colData[i] = e.target.value;
        else rowData[i] = e.target.value;
        generate();
      };
      container.appendChild(input);
    }
  }
}

function generate() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  ensureGridArrays();

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let index = r * cols + c;
      const div = document.createElement("div");
      div.className = "label";
      if (selectedIndices.has(index)) div.classList.add('selected');
      div.onclick = (e) => {
        if (!e.shiftKey && !e.ctrlKey) selectedIndices.clear();
        selectedIndices.has(index) ? selectedIndices.delete(index) : selectedIndices.add(index);
        renderInputs(); generate();
      };
      
      let val = overrides[index] !== null ? overrides[index] : (baseMode === 'column' ? colData[c] : (baseMode === 'row' ? rowData[r] : allData));
      div.innerHTML = val ? val.split(',').map(l => l.trim()).join('<br>') : '';
      grid.appendChild(div);
    }
  }
}

function updateFontSize() {
  document.documentElement.style.setProperty('--font-size', document.getElementById('fontSizeInput').value + 'px');
}

function toggleLabelLines() {
  document.getElementById("grid").classList.toggle('with-label-lines', document.getElementById('labelLinesToggle').checked);
}

function toggleCutLines() {
  document.getElementById("grid").classList.toggle('with-cut-lines', document.getElementById('cutLinesToggle').checked);
}

function applyAlignment() {
  document.getElementById("grid").classList.toggle('align-left', alignment === 'left');
}

function toggleAlignment() { 
  alignment = alignment === 'center' ? 'left' : 'center';
  applyAlignment();
}

function updateZoom(delta) {
  zoomLevel = Math.min(2, Math.max(0.6, zoomLevel + delta));
  const sheet = document.querySelector('.sheet');
  sheet.style.transform = `scale(${zoomLevel})`;
  sheet.style.transformOrigin = 'top left';
  document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
}

function resetZoom() {
  zoomLevel = 1;
  updateZoom(0);
}

function validatePin() {
  const pin = document.getElementById('gridPinInput').value.trim();
  gridUnlocked = pin === '2003';
  document.getElementById('gridLockStatus').textContent = gridUnlocked ? 'Unlocked' : 'Locked';
  document.getElementById('gridLockStatus').style.color = gridUnlocked ? '#34d399' : '#9ca3af';

  document.querySelectorAll('.grid-control').forEach(el => el.disabled = !gridUnlocked);
  if (gridUnlocked) updateGrid();
}

function updateGrid() {
  const root = document.documentElement;
  root.style.setProperty('--top-margin', document.getElementById('tMargin').value + 'mm');
  root.style.setProperty('--left-margin', document.getElementById('lMargin').value + 'mm');

  if (gridUnlocked) {
    cols = Number(document.getElementById('colsInput').value) || cols;
    rows = Number(document.getElementById('rowsInput').value) || rows;
    root.style.setProperty('--cols', cols);
    root.style.setProperty('--label-width', document.getElementById('labelWidthInput').value + 'mm');
    root.style.setProperty('--label-height', document.getElementById('labelHeightInput').value + 'mm');
    root.style.setProperty('--col-gap', document.getElementById('colGapInput').value + 'mm');
    root.style.setProperty('--row-gap', document.getElementById('rowGapInput').value + 'mm');
  } else {
    root.style.setProperty('--cols', cols);
    root.style.setProperty('--label-width', '47mm');
    root.style.setProperty('--label-height', '22.4mm');
    root.style.setProperty('--col-gap', '4.4mm');
    root.style.setProperty('--row-gap', '0mm');
  }
  ensureGridArrays();
  renderInputs();
  generate();
}

function setBaseMode(mode) {
  baseMode = mode;
  renderInputs();
  generate();
}

function clearSelectedOverrides() {
  selectedIndices.forEach(idx => overrides[idx] = null);
  generate(); renderInputs();
}

function insertFormatting(tag) {
  if(!lastFocusedInput) return;
  const start = lastFocusedInput.selectionStart, end = lastFocusedInput.selectionEnd, text = lastFocusedInput.value;
  lastFocusedInput.value = text.substring(0, start) + `<${tag}>` + text.substring(start, end) + `</${tag}>` + text.substring(end);
  lastFocusedInput.dispatchEvent(new Event('input'));
}

function resetApp() { if(confirm("Clear all?")) location.reload(); }

function saveProject() {
  const data = { colData, rowData, allData, overrides, baseMode, alignment, fontSize: document.getElementById('fontSizeInput').value };
  const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = document.getElementById('docNameInput').value + ".json";
  a.click();
}

function loadProject(event) {
  const reader = new FileReader();
  reader.onload = e => {
    const d = JSON.parse(e.target.result);
    colData = d.colData; rowData = d.rowData; allData = d.allData; overrides = d.overrides;
    baseMode = d.baseMode; alignment = d.alignment;
    document.getElementById('fontSizeInput').value = d.fontSize || 12;
    updateFontSize(); setBaseMode(baseMode);
  };
  reader.readAsText(event.target.files[0]);
}

function loadPremade(key) {
  const d = PREMADE_TEMPLATES[key];
  if(d.colData) colData = d.colData;
  if(d.allData) allData = d.allData;
  baseMode = d.baseMode;
  alignment = 'center';
  document.getElementById('fontSizeInput').value = d.textFormat.size;
  updateFontSize(); applyAlignment(); setBaseMode(baseMode);
}

async function downloadPDF() {
  const btn = document.getElementById('btn-pdf');
  btn.innerHTML = "GENERATING...";
  const sheet = document.querySelector(".sheet");
  const canvas = await html2canvas(sheet, { scale: 3 });
  const pdf = new jspdf.jsPDF({ unit: "mm", format: "a4" });
  pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, 0, 210, 297);
  pdf.save(document.getElementById('docNameInput').value + ".pdf");
  btn.innerHTML = "EXPORT PDF";
}
</script>
</body>
</html>
