<!DOCTYPE html>
<html>
<head>
  <title>Avery L6009 Label Editor</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/umd/supabase.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --top-margin: 16.8mm;
      --left-margin: 4.8mm;
      --label-width: 47mm;
      --label-height: 22.4mm;
      --col-gap: 4.4mm;
      --row-gap: 0.0mm;
      --font-size: 12px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: #111827;
      background: radial-gradient(circle at top left, rgba(99,102,241,0.18), transparent 24%), linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
    }
    
    .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; padding: 30px; box-sizing: border-box;}
    .screen.active { display: flex; }

    .ui-controls {
      background: white; padding: 24px; border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.08); position: sticky;
      top: 24px; min-width: 360px; max-height: 90vh; overflow-y: auto;
      border: 1px solid rgba(15,23,42,0.08);
    }

    .ui-controls button, .login-container button {
      display: block; width: 100%; margin: 10px 0; padding: 14px 18px;
      cursor: pointer; background: linear-gradient(135deg, #6366f1, #4338ca);
      color: white; border: none; border-radius: 16px; font-weight: bold;
      transition: opacity 0.2s; box-shadow: 0 10px 30px rgba(79,70,229,0.16);
    }
    
    .ui-controls button:hover, .login-container button:hover { opacity: 0.9; }
    .secondary-btn { background: #f8fafc !important; color: #111827 !important; border: 1px solid rgba(15,23,42,0.08) !important; box-shadow: none !important; }
    .danger-btn { background: #ef4444 !important; box-shadow: none !important; color: white !important; }

    .mode-group { display: flex; gap: 12px; margin-bottom: 15px; }
    .mode-btn {
      flex: 1; background: #f8fafc !important; border: 1px solid rgba(15,23,42,0.08) !important;
      border-radius: 999px !important; color: #111827 !important; padding: 12px 16px;
      font-weight: 600; transition: all 0.2s ease;
    }
    .mode-btn.active { background: linear-gradient(135deg, #6366f1, #4338ca) !important; color: white !important; border-color: transparent !important; }

    .data-input, .tool-input {
      display: block; margin: 5px 0 15px 0; padding: 12px; width: 100%;
      box-sizing: border-box; border: 1px solid rgba(15,23,42,0.08);
      border-radius: 14px; background: #fbfbff;
    }

    .sheet {
      width: 210mm; height: 297mm; background: white;
      box-shadow: 0 28px 90px rgba(15,23,42,0.08); position: relative;
      box-sizing: border-box; flex-shrink: 0; user-select: none;
      border-radius: 4px; border: 1px solid rgba(15,23,42,0.08);
    }

    .grid {
      position: absolute; top: var(--top-margin); left: var(--left-margin);      
      display: grid; grid-template-columns: repeat(4, var(--label-width)); 
      grid-auto-rows: var(--label-height); column-gap: var(--col-gap); row-gap: var(--row-gap);                                 
    }

    .label {
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      text-align: center; box-sizing: border-box; border: 1px solid transparent;
      overflow: hidden; padding: 3.5mm; position: relative; cursor: pointer;
      font-size: var(--font-size);
    }

    .grid.with-label-lines .label { border: 1px solid #ccc; }
    .grid.align-left .label { align-items: flex-start; text-align: left; }
    .label.selected { background-color: #e3f2fd; border: 2px solid #007bff !important; z-index: 10; }
    
    .grid.with-cut-lines .label::after {
      content: ''; position: absolute; top: 1.5mm; left: 1.5mm; right: 1.5mm; bottom: 1.5mm;
      border: 1px dashed #888; pointer-events: none; 
    }

    #loginScreen { align-items: center; justify-content: center; }
    .login-container {
      background: white; border-radius: 24px; padding: 40px; width: 100%;
      max-width: 440px; box-shadow: 0 24px 80px rgba(15,23,42,0.12);
    }

    .project-header { 
      width: min(1200px, 100%); margin: 0 auto 20px; background: white; 
      border-radius: 24px; display: flex; justify-content: space-between; 
      align-items: center; padding: 22px 28px; border: 1px solid rgba(15,23,42,0.08);
    }
    .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 22px; width: min(1200px, 100%); margin: 0 auto; }
    .project-card, .new-project-card { min-height: 240px; background: white; border-radius: 24px; border: 1px solid rgba(15,23,42,0.08); overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .project-card:hover { transform: translateY(-5px); }
    .project-card-preview { height: 160px; background: #6366f1; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; }
    
    #editorScreen { flex-direction: row; align-items: flex-start; justify-content: center; gap: 28px; }

    @media print {
      .ui-controls { display: none !important; }
      .sheet { box-shadow: none; border: none; }
    }
  </style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-container">
    <h1 style="text-align: center;">Avery L6009 Editor</h1>
    <input id="authEmail" type="email" class="tool-input" placeholder="Email address">
    <input id="authPassword" type="password" class="tool-input" placeholder="Password">
    <button onclick="signInWithEmail()">Sign In</button>
    <button onclick="signUpWithEmail()" class="secondary-btn">Create Account</button>
    <button onclick="signInWithGoogle()" class="secondary-btn">Sign In with Google</button>
    <div id="loginMessage" style="text-align: center; margin-top: 15px; font-size: 13px;"></div>
  </div>
</div>

<div id="projectScreen" class="screen">
  <div class="project-header">
    <h1>My Projects</h1>
    <div style="display: flex; gap: 10px;">
      <button onclick="createNewProject()" style="width: auto; padding: 10px 20px;">+ New Project</button>
      <button onclick="signOutFromProjects()" class="danger-btn" style="width: auto; padding: 10px 20px;">Sign Out</button>
    </div>
  </div>
  <div id="projectList" class="project-grid"></div>
</div>

<div id="editorScreen" class="screen">
  <div class="sheet">
    <div class="grid with-label-lines" id="grid"></div>
  </div>

  <div class="ui-controls">
    <button onclick="backToProjects()" class="secondary-btn">← Back to Projects</button>
    <hr>
    <label style="font-weight: bold; font-size: 13px;">Base Layout:</label>
    <div class="mode-group">
      <button id="btn-column" class="mode-btn active" onclick="setBaseMode('column')">Cols</button>
      <button id="btn-row" class="mode-btn" onclick="setBaseMode('row')">Rows</button>
      <button id="btn-all" class="mode-btn" onclick="setBaseMode('all')">All</button>
    </div>

    <label style="font-weight: bold; font-size: 13px;">Text Size:</label>
    <input type="number" id="fontSizeInput" class="tool-input" value="12" oninput="updateFontSize()">

    <div id="dynamic-inputs"></div>

    <button onclick="toggleAlignment()" class="secondary-btn">Toggle Center/Left</button>
    <button onclick="saveProjectToServer()">☁️ Save to Cloud</button>
    <button onclick="downloadPDF()">📄 Download PDF</button>
    <button onclick="window.print()" class="secondary-btn">🖨️ Print (Ctrl+P)</button>
  </div>
</div>

<script>
// --- GLOBAL INITIALIZATION ---
const SUPABASE_URL = 'https://pbyekmlrwuyyhzuenazs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieWVrbWxyd3V5eWh6dWVuYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Mzg4NjMsImV4cCI6MjA5MTMxNDg2M30.Vjs2-BVUCNtldnZF4Vyjg6WUeb7drxznYAh32VzBLTI';

// Create client immediately at the top level
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ROWS = 12; 
const COLS = 4;
let baseMode = 'column'; 
let alignment = 'center';
let selectedIndices = new Set();
let currentUser = null;
let currentProjectId = null;

let colData = new Array(COLS).fill('');
let rowData = new Array(ROWS).fill('');
let allData = '';
let overrides = new Array(ROWS * COLS).fill(null);

// --- APP LOGIC ---

async function initApp() {
  renderInputs();
  generate();
  
  // Check session
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) onUserLogin(session.user);

  // Listen for changes
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session) onUserLogin(session.user);
    else onUserLogout();
  });
}

function onUserLogin(user) {
  currentUser = user;
  showScreen('projectScreen');
  renderProjectList();
}

function onUserLogout() {
  currentUser = null;
  showScreen('loginScreen');
}

async function signInWithEmail() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) alert(error.message);
}

async function signUpWithEmail() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;
  const { error } = await supabaseClient.auth.signUp({ email, password });
  if (error) alert(error.message);
  else alert("Check your email!");
}

async function signInWithGoogle() {
  await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
}

async function signOutFromProjects() {
  await supabaseClient.auth.signOut();
}

async function renderProjectList() {
  const container = document.getElementById('projectList');
  container.innerHTML = '';
  
  const { data } = await supabaseClient.from('projects')
    .select('id,name')
    .eq('user_id', currentUser.id);

  const newCard = document.createElement('div');
  newCard.className = 'new-project-card';
  newCard.onclick = createNewProject;
  newCard.innerHTML = `<div style="font-size: 40px;">+</div><div>New Project</div>`;
  container.appendChild(newCard);

  if (data) {
    data.forEach(p => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.onclick = () => loadProjectById(p.id);
      card.innerHTML = `<div class="project-card-preview">📄</div><div class="project-card-info"><b>${p.name}</b></div>`;
      container.appendChild(card);
    });
  }
}

async function loadProjectById(id) {
  const { data } = await supabaseClient.from('projects').select('data').eq('id', id).single();
  if (data) {
    const d = data.data;
    colData = d.colData; rowData = d.rowData; allData = d.allData; overrides = d.overrides;
    currentProjectId = id;
    showScreen('editorScreen');
    generate();
    renderInputs();
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setBaseMode(m) {
  baseMode = m;
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  renderInputs();
  generate();
}

function renderInputs() {
  const container = document.getElementById('dynamic-inputs');
  container.innerHTML = '';
  let count = baseMode === 'column' ? COLS : (baseMode === 'row' ? ROWS : 1);
  
  for (let i = 0; i < count; i++) {
    const input = document.createElement('input');
    input.className = 'data-input';
    input.value = baseMode === 'column' ? colData[i] : (baseMode === 'row' ? rowData[i] : allData);
    input.oninput = (e) => {
      if (baseMode === 'column') colData[i] = e.target.value;
      else if (baseMode === 'row') rowData[i] = e.target.value;
      else allData = e.target.value;
      generate();
    };
    container.appendChild(input);
  }
}

function generate() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const div = document.createElement('div');
      div.className = 'label';
      let val = overrides[idx] || (baseMode === 'column' ? colData[c] : (baseMode === 'row' ? rowData[r] : allData));
      div.innerHTML = val.split(',').join('<br>');
      grid.appendChild(div);
    }
  }
}

async function saveProjectToServer() {
  const name = document.getElementById('docNameInput')?.value || "Untitled Project";
  const projectData = { colData, rowData, allData, overrides };
  if (currentProjectId) {
    await supabaseClient.from('projects').update({ name, data: projectData }).eq('id', currentProjectId);
  } else {
    await supabaseClient.from('projects').insert([{ user_id: currentUser.id, name, data: projectData }]);
  }
  alert("Saved to cloud!");
}

function createNewProject() {
  currentProjectId = null;
  colData.fill(''); rowData.fill(''); allData = ''; overrides.fill(null);
  showScreen('editorScreen');
  generate();
  renderInputs();
}

function backToProjects() { showScreen('projectScreen'); renderProjectList(); }
function updateFontSize() { document.documentElement.style.setProperty('--font-size', document.getElementById('fontSizeInput').value + 'px'); }
function toggleAlignment() { alignment = alignment === 'center' ? 'left' : 'center'; document.getElementById('grid').classList.toggle('align-left', alignment === 'left'); }

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const sheet = document.querySelector('.sheet');
  const canvas = await html2canvas(sheet, { scale: 3 });
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
  pdf.save('labels.pdf');
}

// --- INITIALIZE ON LOAD ---
window.onload = initApp;

</script>
</body>
</html>
